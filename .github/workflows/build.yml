name: Build APK Agent-maung
on:
  workflow_dispatch

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Alat Lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11 kivy==2.3.0

      - name: Buat Pengaturan Pas
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = AGENT MAUNG BODAS
          package.name = maungbodas
          package.domain = com.maung.bodas
          source.dir = .
          source.include_exts = py,png
          version = 1.0
          
          # BAHAN DASAR (AMAN & RINGAN)
          requirements = python3,kivy
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 26b
          android.archs = arm64-v8a, armeabi-v7a
          android.accept_sdk_license = True
          
          # KUNCI LAYAR TEGAK 100%
          orientation = portrait
          android.orientation = portrait
          
          # 🔑 KUNCI UTAMA: IKON DIATUR DI SINI (WAJIB SAMA PERSIS)
          android.icon = maung_bodas.png
          android.icon_round = maung_bodas.png
          
          android.private_storage = True
          android.enable_androidx = False
          EOF

      - name: Proses Rakit APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug --verbose

      - name: Simpan Hasil
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_ICON_BENAR
          path: bin/*.apk
