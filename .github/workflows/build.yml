name: Build APK Agent-maung
on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Python & Alat
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Pasang Paket Dasar
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk libssl-dev zlib1g-dev libffi-dev build-essential
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11

      - name: Bikin Berkas Pengaturan
        run: |
          cat > buildozer.spec << EOF
[app]
title = AGENT MAUNG
package.name = agentmaung
package.domain = com.maung.agent
source.dir = .
source.include_exts = py,png,jpg
version = 1.0
requirements = python3,flask,requests
android.permissions = INTERNET, ACCESS_NETWORK_STATE
android.api = 34
android.ndk = 26b
android.archs = arm64-v8a, armeabi-v7a
android.accept_sdk_license = True
EOF

      - name: Proses Rakit APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug --verbose

      - name: Simpan Hasil
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_AKHIR
          path: bin/*.apk
