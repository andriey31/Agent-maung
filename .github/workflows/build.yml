name: Build APK Agent-maung
on:
  workflow_dispatch

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Alat Lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11 kivy==2.3.0 flask==3.0.3

      - name: Buat Berkas Pengaturan
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = AGENT MAUNG BODAS
          package.name = maungbodas
          package.domain = com.maung.bodas
          source.dir = .
          source.include_exts = py,png,jpg,ttf
          version = 1.0
          
          # PENGATURAN INTI
          requirements = python3,kivy,flask,android
          android.permissions = INTERNET, ACCESS_NETWORK_STATE
          android.api = 33
          android.minapi = 21
          android.ndk = 26b
          android.archs = arm64-v8a, armeabi-v7a
          android.accept_sdk_license = True
          
          # KUNCI LAYAR TEGAK
          orientation = portrait
          android.orientation = portrait
          
          # IKON APLIKASI (PASTIKAN NAMA SAMA)
          android.icon = maung_bodas.png
          android.icon_round = maung_bodas.png
          
          android.private_storage = True
          EOF

      - name: Proses Rakit APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug --verbose

      - name: Simpan Hasil
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_BERHASIL
          path: bin/*.apk
