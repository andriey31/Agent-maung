name: Build APK Agent-maung
on:
  workflow_dispatch

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Alat Lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11 kivy==2.3.0 requests==2.32.3

      - name: BUAT IKON KHUSUS (BIAR DI LUAR MUNCUL)
        run: |
          mkdir -p res/drawable/
          mkdir -p res/mipmap-hdpi/
          mkdir -p res/mipmap-mdpi/
          mkdir -p res/mipmap-xhdpi/
          mkdir -p res/mipmap-xxhdpi/
          mkdir -p res/mipmap-xxxhdpi/
          
          cp maung_bodas.png res/drawable/icon.png
          cp maung_bodas.png res/mipmap-hdpi/ic_launcher.png
          cp maung_bodas.png res/mipmap-mdpi/ic_launcher.png
          cp maung_bodas.png res/mipmap-xhdpi/ic_launcher.png
          cp maung_bodas.png res/mipmap-xxhdpi/ic_launcher.png
          cp maung_bodas.png res/mipmap-xxxhdpi/ic_launcher.png

          cat > buildozer.spec << 'EOF'
          [app]
          title = AGENT MAUNG BODAS
          package.name = maungbodas
          package.domain = com.maung.bodas
          source.dir = .
          source.include_exts = py,png,json
          version = 1.0
          
          # 🧠 BAHAN UNTUK AI
          requirements = python3,kivy,requests
          android.permissions = INTERNET, ACCESS_NETWORK_STATE
          android.api = 33
          android.minapi = 21
          android.ndk = 26b
          android.archs = arm64-v8a, armeabi-v7a
          android.accept_sdk_license = True
          
          # 🔒 KUNCI LAYAR TEGAK
          orientation = portrait
          android.orientation = portrait
          
          # 🐅 IKON DI LUAR MENU HP
          android.icon = res/drawable/icon.png
          android.icon_round = res/drawable/icon.png
          android.icon_foreground = res/drawable/icon.png
          android.icon_background = "#000000"
          
          android.private_storage = True
          android.enable_androidx = False
          EOF

      - name: Proses Rakit APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug --verbose

      - name: Simpan Hasil
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_AI_GEMINI
          path: bin/*.apk
