name: Build APK Agent-maung
on:
  workflow_dispatch:

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    env:
      HOME: /home/runner
      ANDROID_SDK_ROOT: /home/runner/android-sdk
    steps:
      - name: Ambil kode proyek
        uses: actions/checkout@v4

      - name: Pasang alat dasar lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git wget zip unzip openjdk-11-jdk python3-pip build-essential libssl-dev zlib1g-dev libffi-dev
          pip install --upgrade pip
          pip install buildozer==1.4.0 cython==0.29.36

      - name: Pasang Android SDK Manager Secara Manual
        run: |
          # Unduh alat SDK yang hilang itu
          mkdir -p $ANDROID_SDK_ROOT
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d $ANDROID_SDK_ROOT
          # Masukkan ke jalur sistem biar terbaca
          echo "PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/bin:$ANDROID_SDK_ROOT/platform-tools" >> ~/.bashrc
          source ~/.bashrc

      - name: Siapkan izin dan lokasi
        run: |
          chmod -R 777 $HOME
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_SDK=$ANDROID_SDK_ROOT

      - name: Jalankan Buildozer
        run: |
          buildozer android debug --verbose

      - name: Simpan Hasil
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_BERHASIL
          path: bin/*.apk
