name: Build APK Agent-maung
on:
  workflow_dispatch:

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04  # Pakai versi Ubuntu yang paling stabil
    steps:
      - name: Ambil kode proyek
        uses: actions/checkout@v4

      - name: Pasang alat lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git wget zip unzip openjdk-11-jdk python3-pip build-essential libssl-dev zlib1g-dev libffi-dev
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.4.0 cython==0.29.36  # Versi yang paling aman dan kompatibel

      - name: Siapkan lingkungan
        run: |
          echo "export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64" >> ~/.bashrc
          echo "export ANDROID_API=33" >> ~/.bashrc
          source ~/.bashrc

      - name: Proses bikin APK
        run: |
          buildozer android debug --verbose

      - name: Simpan hasil jadi
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_APK_BERHASIL
          path: bin/*.apk
