name: Build APK Agent-maung
on:
  workflow_dispatch

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Pasang Alat Lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip imagemagick -y
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11 kivy==2.3.0 requests==2.32.3

      - name: Bikin Ikon Lengkap
        run: |
          mkdir -p res/mipmap-mdpi res/mipmap-hdpi res/mipmap-xhdpi res/mipmap-xxhdpi res/mipmap-xxxhdpi
          
          convert maung_bodas.png -resize 48x48  res/mipmap-mdpi/ic_launcher.png
          convert maung_bodas.png -resize 72x72  res/mipmap-hdpi/ic_launcher.png
          convert maung_bodas.png -resize 96x96  res/mipmap-xhdpi/ic_launcher.png
          convert maung_bodas.png -resize 144x144 res/mipmap-xxhdpi/ic_launcher.png
          convert maung_bodas.png -resize 192x192 res/mipmap-xxxhdpi/ic_launcher.png
          convert maung_bodas.png -resize 192x192 res/mipmap-xxxhdpi/ic_launcher_round.png

          cat > buildozer.spec << 'EOF'
          [app]
          title = AGENT MAUNG BODAS
          package.name = maungbodas
          package.domain = com.maung.bodas
          source.dir = .
          source.include_exts = py,png
          version = 1.0
          
          requirements = python3,kivy,requests
          android.permissions = INTERNET, ACCESS_NETWORK_STATE
          android.api = 33
          android.minapi = 21
          android.ndk = 26b
          android.archs = arm64-v8a, armeabi-v7a
          android.accept_sdk_license = True
          
          orientation = portrait
          android.orientation = portrait
          
          android.icon = res/mipmap-xxxhdpi/ic_launcher.png
          android.icon_round = res/mipmap-xxxhdpi/ic_launcher_round.png
          
          android.private_storage = True
          android.enable_androidx = False
          EOF

      - name: Proses Rakit APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          buildozer android debug --verbose

      - name: Simpan Hasil
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_SAMA_DOLA
          path: bin/*.apk
