name: Build APK Agent-maung
on:
  workflow_dispatch:

jobs:
  bikin_apk:
    runs-on: ubuntu-22.04
    env:
      USER: runner
      HOME: /home/runner
      # Semua disimpan di sini, aman penuh izin
      ANDROID_SDK_HOME: /home/runner/sdk
      BUILDOZER_CACHE_DIR: /home/runner/cache
    steps:
      - name: Ambil kode proyek
        uses: actions/checkout@v4

      - name: Pasang semua alat lengkap
        run: |
          sudo apt update -y
          sudo apt install -y git wget zip unzip openjdk-11-jdk python3-pip python3-venv build-essential libssl-dev zlib1g-dev libffi-dev
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install --no-cache-dir buildozer==1.5.0 cython==0.29.36

      - name: Siapkan folder kerja aman
        run: |
          mkdir -p $HOME/sdk $HOME/cache $HOME/work
          chmod -R 777 $HOME  # Beri izin penuh ke semua folder kita

      - name: Jalankan pembuatan APK
        run: |
          buildozer android debug --verbose --no-copy-libs

      - name: Simpan hasil jika sukses
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AGENT_MAUNG_AKHIR
          path: bin/*.apk
